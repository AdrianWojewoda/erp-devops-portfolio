global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8082"]

  - job_name: "backend"
    static_configs:
      - targets: ["backend:8000"]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
