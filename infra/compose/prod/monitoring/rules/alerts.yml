groups:
  - name: erp-alerts
    rules:

      - alert: ERPDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ERP backend is down"
          description: "Backend container is not responding to Prometheus scrape."

      - alert: High5xxRate
        expr: |
          (
            sum(rate(traefik_router_requests_total{code=~"5.."}[2m]))
            /
            sum(rate(traefik_router_requests_total[2m]))
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx rate detected"
          description: "More than 5% of requests return HTTP 5xx."
