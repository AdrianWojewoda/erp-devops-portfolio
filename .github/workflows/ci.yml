name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose (prod)
        run: |
          docker compose -f infra/compose/prod/compose.yml config >/dev/null

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_file: .yamllint

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts

  build-backend:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t erp-backend:ci ./app/backend

  trivy:
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image (for scan)
        run: |
          docker build -t erp-backend:ci ./app/backend

      - name: Trivy scan (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: erp-backend:ci
          format: table
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
